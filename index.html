<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Search Engine</title>
    <link rel="stylesheet" href="Main.css">
</head>
<body>
    <h1>Murtaza's Premium Image Search Engine</h1>
    <form id="BoxForm">
        <input type="text" id="InputBox" placeholder="Search any kind of image...">
        <button id="InputBTN">Search</button>
    </form>
    <div id="SearchResult"></div>
    <button id="ShowMore">Show More</button>
    <div id="DownloadPopup">
    <div class="PopupBox">
        <h2>Download Image?</h2>
        <p>Do you want to download this image?</p>
        <div class="PopupButtons">
            <button id="YesDownload">Yes</button>
            <button id="ClosePopup">Cancel</button>
        </div>
    </div>
</div>
</body>
<script src="Main.js"></script>
</html>
